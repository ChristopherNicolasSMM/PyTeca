{# Modal de formulário para Book — gerado automaticamente #}
<div class="modal fade" id="bookModal" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog modal-lg">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="bookModalTitle">Novo Livros</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <form id="bookForm">
          <input type="hidden" id="bookId">
                    <div class="row mb-3">
            <label for="title" class="col-sm-3 col-form-label">Title</label>
            <div class="col-sm-9">
              <input type="text" class="form-control" id="title" name="title">
            </div>
          </div>
          <div class="row mb-3 fk-field" data-field="author_id" data-foreign-table="authors">
            <label class="col-sm-3 col-form-label">Author Id</label>
            <div class="col-sm-9">
              <input type="hidden" name="author_id" class="fk-hidden-id">
              <div class="input-group">
                <input type="text" class="form-control fk-search-input" placeholder="Digite para buscar..." autocomplete="off">
                <button class="btn btn-outline-secondary fk-clear-btn" type="button" title="Limpar">
                  <i class="bi bi-x"></i>
                </button>
              </div>
              <div class="invalid-feedback">Selecione um valor válido.</div>
            </div>
          </div>
          <div class="row mb-3">
            <label for="isbn" class="col-sm-3 col-form-label">Isbn</label>
            <div class="col-sm-9">
              <input type="text" class="form-control" id="isbn" name="isbn">
            </div>
          </div>
          <div class="row mb-3">
            <label for="publisher" class="col-sm-3 col-form-label">Publisher</label>
            <div class="col-sm-9">
              <input type="text" class="form-control" id="publisher" name="publisher">
            </div>
          </div>
          <div class="row mb-3">
            <label for="year" class="col-sm-3 col-form-label">Year</label>
            <div class="col-sm-9">
              <input type="text" class="form-control" id="year" name="year">
            </div>
          </div>
          <div class="row mb-3">
            <label for="edition" class="col-sm-3 col-form-label">Edition</label>
            <div class="col-sm-9">
              <input type="text" class="form-control" id="edition" name="edition">
            </div>
          </div>
          <div class="row mb-3">
            <label for="genre" class="col-sm-3 col-form-label">Genre</label>
            <div class="col-sm-9">
              <input type="text" class="form-control" id="genre" name="genre">
            </div>
          </div>
          <div class="row mb-3">
            <label for="description" class="col-sm-3 col-form-label">Description</label>
            <div class="col-sm-9">
              <input type="text" class="form-control" id="description" name="description">
            </div>
          </div>
          <div class="row mb-3">
            <label for="cover_url" class="col-sm-3 col-form-label">Cover Url</label>
            <div class="col-sm-9">
              <input type="text" class="form-control" id="cover_url" name="cover_url">
            </div>
          </div>
          <div class="row mb-3">
            <label for="language" class="col-sm-3 col-form-label">Language</label>
            <div class="col-sm-9">
              <input type="text" class="form-control" id="language" name="language">
            </div>
          </div>
          <div class="row mb-3">
            <label for="quantity" class="col-sm-3 col-form-label">Quantity</label>
            <div class="col-sm-9">
              <input type="text" class="form-control" id="quantity" name="quantity">
            </div>
          </div>
          <div class="row mb-3">
            <label for="available" class="col-sm-3 col-form-label">Available</label>
            <div class="col-sm-9">
              <input type="text" class="form-control" id="available" name="available">
            </div>
          </div>
        </form>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <button type="button" class="btn btn-primary" id="btnSaveBook">Salvar</button>
      </div>
    </div>
  </div>
</div>

<script>
  (function() {
    const abortControllers = new Map();

    function getOrCreateDatalist(fieldName) {
      let datalist = document.getElementById(`datalist-${fieldName}`);
      if (!datalist) {
        datalist = document.createElement('datalist');
        datalist.id = `datalist-${fieldName}`;
        document.body.appendChild(datalist);
      }
      return datalist;
    }

    function setupForeignKeyField(container) {
      const fieldName = container.dataset.field;
      const foreignTable = container.dataset.foreignTable;
      const hiddenInput = container.querySelector('.fk-hidden-id');
      const searchInput = container.querySelector('.fk-search-input');
      const clearBtn = container.querySelector('.fk-clear-btn');

      const datalist = getOrCreateDatalist(fieldName);
      searchInput.setAttribute('list', datalist.id);

      clearBtn.addEventListener('click', () => {
        searchInput.value = '';
        hiddenInput.value = '';
        searchInput.focus();
      });

      let debounceTimer;
      searchInput.addEventListener('input', (e) => {
        clearTimeout(debounceTimer);
        const query = e.target.value.trim();
        if (query.length < 2) { datalist.innerHTML = ''; return; }
        debounceTimer = setTimeout(() => loadOptions(query), 300);
      });

      async function loadOptions(search) {
        if (abortControllers.has(fieldName)) abortControllers.get(fieldName).abort();
        const controller = new AbortController();
        abortControllers.set(fieldName, controller);
        try {
          const url = `/api/options/${foreignTable}?search=${encodeURIComponent(search)}`;
          const response = await fetch(url, { signal: controller.signal });
          const data = await response.json();
          datalist.innerHTML = '';
          data.results.forEach(opt => {
            const option = document.createElement('option');
            option.value = opt.text;
            option.dataset.id = opt.id;
            datalist.appendChild(option);
          });
        } catch (err) {
          if (err.name === 'AbortError') return;
          console.error('Erro ao buscar opções:', err);
        } finally {
          abortControllers.delete(fieldName);
        }
      }

      searchInput.addEventListener('change', () => {
        const selected = Array.from(datalist.options).find(o => o.value === searchInput.value);
        hiddenInput.value = selected ? selected.dataset.id : '';
      });
    }

    window.setForeignKeyValue = function(modalId, fieldName, id, text) {
      const modal = document.getElementById(modalId);
      if (!modal) return;
      const container = modal.querySelector(`.fk-field[data-field="${fieldName}"]`);
      if (!container) return;
      const hidden = container.querySelector('.fk-hidden-id');
      const search = container.querySelector('.fk-search-input');
      if (hidden && search) { hidden.value = id; search.value = text || ''; }
    };

    const modalElement = document.getElementById('bookModal');
    if (modalElement) {
      modalElement.addEventListener('shown.bs.modal', function() {
        modalElement.querySelectorAll('.fk-field').forEach(setupForeignKeyField);
      });
    }
  })();
</script>
