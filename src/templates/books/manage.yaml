resource: books
title: "Acervo de Livros"

list:
  table:
    columns:
      - { name: "Título", field: "title", sortable: true, filterable: true, default_visible: true, order: 1 }
      - { name: "Autor", field: "author", sortable: true, filterable: true, default_visible: true, order: 2 }
      - { name: "ISBN", field: "isbn", sortable: true, filterable: true, default_visible: false, order: 3 }
      - { name: "Gênero", field: "genre", sortable: true, filterable: true, default_visible: true, order: 4 }
      - { name: "Estoque (disp/total)", field: "stock", sortable: false, filterable: true, default_visible: true, order: 5 }
    order_by: "title"
    order_dir: "asc"
  pagination:
    per_page_options: [10, 20, 50, 100]
    default_per_page: 20
  export:
    enabled: true
    formats: ["csv", "json", "sql"]
  filters:
    enabled: true
  buttons:
    new:
      enabled: true
      permission: "is_authenticated"
      label: "Novo Livro"
      icon: "bi-plus-circle"
      color: "primary"      # Opções: primary, secondary, success, danger, warning, info, light, dark
    view:
      enabled: true
      permission: "is_authenticated"
      label: "Ver"
      icon: "bi-eye"
      color: "info"
    edit:
      enabled: true
      permission: "is_authenticated"
      label: "Editar"
      icon: "bi-pencil"
      color: "secondary"
    delete:
      enabled: true
      permission: "is_admin"
      label: "Excluir"
      icon: "bi-trash"
      color: "danger"
    save_layout:
      enabled: true
      permission: "is_authenticated"
      label: "Salvar Layout"
      icon: "bi-save"
      color: "warning"

form:
  layout: "vertical"
  fields:
    - { name: "title", label: "Título", type: "text", required: true, order: 1 }
    - { name: "author", label: "Autor", type: "text", required: true, order: 2 }
    - { name: "isbn", label: "ISBN", type: "text", required: false, order: 3 }
    - { name: "genre", label: "Gênero", type: "text", required: false, order: 4 }
    - { name: "quantity", label: "Quantidade total", type: "number", required: false, order: 5 }
    - { name: "available", label: "Disponível", type: "number", required: false, order: 6 }
    - { name: "description", label: "Descrição", type: "textarea", required: false, order: 7 }
  buttons:
    save:
      enabled: true
      label: "Salvar"
      icon: "bi-check"
      color: "success"
    cancel:
      enabled: true
      label: "Cancelar"
      icon: "bi-x"
      color: "secondary"

detail:
  fields:
    - { name: "title", label: "Título" }
    - { name: "author", label: "Autor" }
    - { name: "isbn", label: "ISBN" }
    - { name: "genre", label: "Gênero" }
    - { name: "quantity", label: "Quantidade total" }
    - { name: "available", label: "Disponível" }
    - { name: "description", label: "Descrição" }
    - { name: "created_at", label: "Cadastrado em" }
  buttons:
    edit:
      enabled: true
      permission: "is_authenticated"