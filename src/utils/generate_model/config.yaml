## Configuração do gerador automático de CRUD
## Execute: flask generate  ou  flask generate --model model/author.py

models:
  - source: "model/author.py"
    # class_name: "Author"   # opcional — filtra uma classe específica do arquivo
    # plural: "authors"      # opcional — sobrescreve @plural do model

  # - source: "model/book.py"
  # - source: "model/product.py"

generator:
  # Pasta de templates a usar. Deve existir dentro de:
  #   utils/generate_model/templates/<template_theme>/
  # Padrão: "standard"
  template_theme: "standard"

  # Se true, sobrescreve arquivos já existentes (com backup automático no futuro).
  # Se false, pula arquivos que já existem.
  overwrite: false

  # Atualização automática do main.py (não implementado ainda).
  update_main: false
